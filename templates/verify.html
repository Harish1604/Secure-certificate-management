<!DOCTYPE html>
<html>

<head>
    <title>Verification Result | Secure Certs</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container" style="max-width: 600px;">
        <div class="card" style="text-align: center;">
            <div style="margin-bottom: 2rem;">
                {% if valid %}
                <div
                    style="width: 80px; height: 80px; background: rgba(16, 185, 129, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 1px solid rgba(16, 185, 129, 0.3);">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="3"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <h2 style="color: var(--success); margin-bottom: 0.5rem; -webkit-text-fill-color: initial;">Valid
                    Certificate</h2>
                <p style="color: var(--text-muted);">The digital signature is authentic.</p>
                {% else %}
                <div
                    style="width: 80px; height: 80px; background: rgba(239, 68, 68, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 1px solid rgba(239, 68, 68, 0.3);">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="3"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </div>
                <h2 style="color: var(--error); margin-bottom: 0.5rem; -webkit-text-fill-color: initial;">Invalid
                    Certificate</h2>
                <p style="color: var(--text-muted);">The signature verification failed.</p>
                {% endif %}
            </div>

            {% if valid %}
            <div
                style="background: rgba(255,255,255,0.03); border-radius: 12px; padding: 1.5rem; text-align: left; margin-bottom: 2rem; border: 1px solid var(--glass-border);">
                <label>Decrypted Content</label>
                <div style="font-size: 1.25rem; font-weight: 600; color: var(--text-main); margin-top: 0.5rem;">
                    {{ data }}
                </div>
            </div>
            {% endif %}

            <div style="text-align: left;">
                <div style="margin-bottom: 1.5rem;">
                    <label>Encrypted Certificate Data</label>
                    <div
                        style="background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px; margin-top: 0.5rem; overflow-x: auto;">
                        <code
                            style="font-family: monospace; color: var(--text-muted); font-size: 0.8rem; white-space: nowrap;">{{ enc_cert }}</code>
                    </div>
                </div>

                <div>
                    <label>Digital Signature</label>
                    <div
                        style="background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px; margin-top: 0.5rem; overflow-x: auto;">
                        <code
                            style="font-family: monospace; color: var(--text-muted); font-size: 0.8rem; white-space: nowrap;">{{ signature }}</code>
                    </div>
                </div>
            </div>

            <a href="/dashboard"
                style="margin-top: 2rem; display: inline-block; width: auto; padding: 0.75rem 2rem; background: rgba(255,255,255,0.1); border-radius: 8px; color: var(--text-main);">Back
                to Dashboard</a>
        </div>
    </div>
</body>

</html>
