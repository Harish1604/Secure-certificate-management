<!DOCTYPE html>
<html>

<head>
    <title>Verification Result | Secure Certs</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container" style="max-width: 700px;">
        <div class="card">
            <h2>Verification Status </h2>

            {% if valid %}
            <div class="alert"
                style="background: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3);">
                ✅ AUTHENTICATED: Certificate is Valid
            </div>
            {% else %}
            <div class="alert alert-error">
                ❌ INVALID: Integrity Check Failed
            </div>
            {% endif %}

            <div style="margin-top: 2rem;">
                <h3>Decrypted Identity Data</h3>
                <div
                    style="background: rgba(15,23,42,0.6); padding: 1rem; border-radius: 8px; border: 1px solid var(--glass-border); font-family: monospace; color: #fff;">
                    {{ data }}
                </div>
            </div>

            <div style="margin-top: 2rem;">
                <h3>Cryptographic Proofs</h3>

                <label>RSA-Encrypted AES Key (Base64)</label>
                <div
                    style="background: rgba(0,0,0,0.2); padding: 0.5rem; font-size: 0.8rem; word-break: break-all; margin-bottom: 1rem; border-radius: 4px; color: var(--text-secondary);">
                    {{ enc_key }}
                </div>

                <label>AES-Encrypted Certificate (Base64)</label>
                <div
                    style="background: rgba(0,0,0,0.2); padding: 0.5rem; font-size: 0.8rem; word-break: break-all; margin-bottom: 1rem; border-radius: 4px; color: var(--text-secondary);">
                    {{ enc_cert }}
                </div>

                <label>Digital Signature (Base64)</label>
                <div
                    style="background: rgba(0,0,0,0.2); padding: 0.5rem; font-size: 0.8rem; word-break: break-all; border-radius: 4px; color: var(--text-secondary);">
                    {{ signature }}
                </div>
            </div>

            <a href="/dashboard">Back to Dashboard</a>
        </div>
    </div>
</body>

</html>
